<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Life Dashboard">
<meta name="theme-color" content="#0f0f11">
<title>Life Dashboard</title>
<style>
:root{--bg:#0f0f11;--card:#18181c;--card2:#23232a;--border:#303038;--text:#f4f4f6;--muted:#a0a0ad;--gold:#d4a853;--blue:#5b8cff;--purple:#c97cf4;--orange:#f4a14e;--green:#3dd68c;--red:#ff5f6d}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;min-height:100%;overflow-x:hidden}button,input,textarea,select{font:inherit;font-size:16px}button{cursor:pointer}.app{max-width:620px;margin:0 auto;min-height:100vh;min-height:100dvh;padding-bottom:calc(92px + env(safe-area-inset-bottom))}.header{position:sticky;top:0;z-index:10;background:rgba(15,15,17,.97);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border);padding:calc(env(safe-area-inset-top) + 18px) 16px 14px;display:flex;align-items:center;justify-content:space-between}.brand{font-weight:900;font-size:18px}.headerBtns,.actions,.quickRow{display:flex;gap:8px;flex-wrap:wrap}.page{padding:18px 16px}.pageTitle{font-size:30px;font-weight:900;margin-bottom:16px}.card,.quick{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px}.quick{border-color:rgba(212,168,83,.5);margin-bottom:16px}.sectionTitle{font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin:22px 0 10px}.row{display:flex;gap:10px;align-items:flex-start}.grow{flex:1;min-width:0}.title{font-weight:800;font-size:15px;line-height:1.35}.sub{color:var(--muted);font-size:13px;line-height:1.4;margin-top:4px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;font-weight:800;border-radius:999px;padding:4px 8px;background:var(--card2);color:var(--muted);border:1px solid var(--border)}.btn,.iconBtn{border:0;border-radius:10px;padding:10px 14px;font-weight:900;background:var(--gold);color:#111}.iconBtn,.btn.secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}.btn.danger{background:rgba(255,95,109,.15);color:var(--red);border:1px solid rgba(255,95,109,.35)}.btn.small{font-size:13px;padding:7px 10px}.input{width:100%;background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:12px;outline:none}textarea.input{min-height:82px;resize:vertical}.field{margin-bottom:13px}.label{display:block;font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}.checkbox{width:24px;height:24px;border-radius:7px;border:2px solid var(--border);background:transparent;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:900}.checkbox.done{background:var(--green);border-color:var(--green)}.bottomNav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:20;width:100%;max-width:620px;background:rgba(15,15,17,.98);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom)}.navBtn{flex:1;border:0;background:transparent;color:var(--muted);padding:10px 0 8px;font-size:11px;font-weight:800}.navBtn.active{color:var(--gold)}.navIcon{font-size:19px;display:block;margin-bottom:3px}.empty{text-align:center;color:var(--muted);padding:50px 10px}.modalBg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:flex;align-items:flex-end}.modal{width:100%;max-width:620px;margin:0 auto;background:var(--card);border-radius:20px 20px 0 0;max-height:90vh;overflow:auto;padding:18px 16px calc(34px + env(safe-area-inset-bottom))}.modalTop{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.modalTitle{font-size:21px;font-weight:900}.search{margin-bottom:12px}.stageLine{display:flex;gap:5px;overflow-x:auto;padding-bottom:3px;margin-top:10px}.stagePill{font-size:10px;font-weight:900;border-radius:8px;padding:5px 8px;background:var(--card2);color:var(--muted);white-space:nowrap}.stagePill.active{background:var(--purple);color:white}.progress{height:5px;background:var(--card2);border-radius:99px;overflow:hidden;margin-top:10px}.progressFill{height:100%;background:var(--orange)}.undo{position:fixed;left:16px;right:16px;bottom:calc(88px + env(safe-area-inset-bottom));z-index:800;max-width:590px;margin:0 auto;background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:13px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 8px 30px rgba(0,0,0,.4)}
</style>
</head><body><div id="app" class="app"></div>
<script>
(function(){
'use strict';
const KEY='life_dashboard_full_v3';
const OLD_KEYS=['life_dashboard_full_v2'];
const START_DATA = {"inbox": [], "tasks": [{"id": "ftp3s6fd", "title": "Kishan sihasan", "category": "kala", "dueDate": "2026-05-18", "status": "done", "pinned": false, "notes": ""}, {"id": "pvup1k65", "title": "Clean room", "category": "personal", "dueDate": "2026-05-18", "status": "todo", "pinned": false, "notes": ""}, {"id": "itgbs4p2", "title": "Sihasan Sunny", "category": "mandir", "dueDate": "2026-05-18", "notes": "", "pinned": false, "status": "done"}, {"id": "t1", "title": "Call Dev about Diwali event", "category": "personal", "dueDate": "2026-05-18", "status": "done", "pinned": true, "notes": ""}, {"id": "t2", "title": "Finish wedding box lid design", "category": "kala", "dueDate": "2026-05-18", "status": "done", "pinned": false, "notes": "Purple with gold foil"}, {"id": "t3", "title": "Order foam sheets 2 inch", "category": "mandir", "dueDate": "2026-05-20", "status": "done", "pinned": false, "notes": ""}, {"id": "t4", "title": "Reply to Priya about custom frame", "category": "kala", "dueDate": "2026-05-22", "status": "done", "pinned": false, "notes": ""}, {"id": "t5", "title": "Random idea: telescope illusion build", "category": "other", "dueDate": "", "status": "done", "pinned": false, "notes": ""}], "orders": [{"id": "tsmjqzjp", "customer": "Shivani ", "item": "Ghar Mandir ", "source": "Instagram DM", "price": "", "dueDate": "", "stage": "Inquiry", "notes": ""}, {"id": "npngrr62", "customer": "Niki", "item": "Ring box", "source": "Instagram DM", "price": "", "dueDate": "", "stage": "Inquiry", "notes": ""}, {"id": "d5i3unre", "customer": "Krupa", "item": "NV wall art type ", "source": "Instagram DM", "price": "", "dueDate": "", "stage": "Inquiry", "notes": ""}, {"id": "g28wqwvd", "customer": "Mualik", "item": "Sihsan", "source": "Instagram DM", "price": "", "dueDate": "", "stage": "Inquiry", "notes": ""}, {"id": "cw7fpa98", "customer": "Shivam", "item": "Ringbox", "source": "Instagram DM", "price": "135", "dueDate": "", "stage": "Designing", "notes": "Unpaid"}, {"id": "18iwb6p0", "customer": "Kishan", "item": "Ring box ", "source": "Instagram DM", "price": "135", "dueDate": "", "stage": "Designing", "notes": "Unpaid"}, {"id": "on4xh97e", "customer": "Kishan", "item": "Sihsan", "source": "Instagram DM", "price": "300", "dueDate": "2026-05-22", "stage": "Finishing", "notes": "Gems "}], "builds": [{"id": "mcg59fvs", "event": "Sunny ", "buildName": "Sihasan", "section": "", "status": "Building", "date": "2026-05-18", "people": "", "notes": "", "materials": "", "subtasks": []}]};
const orderStages=['Inquiry','Designing','Printing','Finishing','Packing','Shipped','Delivered'];
const buildStages=['Idea','Planning','Materials','Building','Ready','Done'];
let state={data:loadData(),tab:'agenda',modal:null,editing:null,search:'',undo:null,filter:'active'};
function today(){return new Date().toISOString().split('T')[0]}
function daysFrom(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]}
function uid(){return Math.random().toString(36).slice(2,10)}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function fmt(date){if(!date)return'';try{return new Date(date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}catch{return date}}
function normalize(d){d=d&&typeof d==='object'?d:{};return {inbox:Array.isArray(d.inbox)?d.inbox:[],tasks:Array.isArray(d.tasks)?d.tasks:[],orders:Array.isArray(d.orders)?d.orders:[],builds:Array.isArray(d.builds)?d.builds:[]}}
function loadData(){try{const saved=localStorage.getItem(KEY)||OLD_KEYS.map(k=>localStorage.getItem(k)).find(Boolean);return normalize(saved?JSON.parse(saved):START_DATA)}catch(e){console.warn(e);return normalize(START_DATA)}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state.data))}catch(e){alert('Save failed: '+e.message)}}
function setData(fn){state.data=normalize(fn(state.data));save();render()}
function chip(t,color){return `<span class="chip" ${color?`style="color:${color}"`:''}>${esc(t)}</span>`}
function input(name,value,type='text',ph=''){return `<input class="input" name="${name}" type="${type}" value="${esc(value||'')}" placeholder="${esc(ph)}">`}
function textarea(name,value,ph=''){return `<textarea class="input" name="${name}" placeholder="${esc(ph)}">${esc(value||'')}</textarea>`}
function field(label,inner){return `<div class="field"><label class="label">${esc(label)}</label>${inner}</div>`}
function groupByDate(items,key='dueDate'){const g={Overdue:[],Today:[],Tomorrow:[], 'This Week':[], Upcoming:[], 'No Date':[]};items.forEach(it=>{const d=it[key]; if(!d)return g['No Date'].push(it); if(d<today())return g.Overdue.push(it); if(d===today())return g.Today.push(it); if(d===daysFrom(1))return g.Tomorrow.push(it); const diff=(new Date(d)-new Date(today()))/86400000; (diff<=7?g['This Week']:g.Upcoming).push(it)});return g}
function layout(content){document.getElementById('app').innerHTML=`<div class="header"><div class="brand">Life Dashboard</div><div class="headerBtns"><button class="iconBtn" data-action="newTask">Add</button><button class="iconBtn" data-action="settings">Set</button></div></div>${content}<div class="bottomNav">${[['agenda','A','Agenda'],['inbox','I','Inbox'],['orders','O','Orders'],['builds','B','Builds']].map(t=>`<button class="navBtn ${state.tab===t[0]?'active':''}" data-tab="${t[0]}"><span class="navIcon">${t[1]}</span>${t[2]}</button>`).join('')}</div>${state.undo?`<div class="undo"><div>Task completed</div><button class="btn small" data-action="undo">Undo</button></div>`:''}${modalHtml()}`}
function pageTop(title,add){return `<div style="display:flex;justify-content:space-between;align-items:center"><h1 class="pageTitle">${title}</h1>${add?`<button class="btn" data-action="${add}">Add</button>`:''}</div>`}
function renderAgenda(){const pending=state.data.tasks.filter(t=>t.status!=='done').sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999')); const done=state.data.tasks.filter(t=>t.status==='done'); const g=groupByDate(pending); let h=`<div class="page">${pageTop('Agenda','newTask')}`; if(!pending.length)h+=`<div class="empty">Nothing pending.</div>`; Object.entries(g).forEach(([sec,items])=>{if(!items.length)return; h+=`<div class="sectionTitle">${sec}</div>`+items.map(taskCard).join('')}); if(done.length){h+=`<div class="sectionTitle">Completed (${done.length})</div>`+done.slice(0,15).map(taskCard).join('')} return h+'</div>'}
function taskCard(t){const colors={personal:'var(--blue)',kala:'var(--purple)',mandir:'var(--orange)',other:'var(--green)',Personal:'var(--blue)',Kala:'var(--purple)',Mandir:'var(--orange)',Other:'var(--green)'}; return `<div class="card"><div class="row"><button class="checkbox ${t.status==='done'?'done':''}" data-action="toggleTask" data-id="${t.id}">${t.status==='done'?'✓':''}</button><div class="grow"><div class="title">${esc(t.title)}</div><div class="chips">${chip(t.category||'Other',colors[t.category])}${t.dueDate?chip(fmt(t.dueDate)):''}${t.pinned?chip('Pinned','var(--gold)'):''}</div>${t.notes?`<div class="sub">${esc(t.notes)}</div>`:''}</div><button class="iconBtn" data-action="editTask" data-id="${t.id}">Edit</button></div></div>`}
function renderInbox(){let h=`<div class="page"><h1 class="pageTitle">Inbox</h1><div class="quick"><div class="quickRow"><input class="input" id="quickInbox" placeholder="Quick dump anything..."><button class="btn" data-action="addInbox">Add</button></div><div class="sub">Fast capture tasks or orders. Sort later.</div></div>`; if(!state.data.inbox.length)h+=`<div class="empty">Inbox empty.</div>`; state.data.inbox.forEach(i=>h+=`<div class="card"><div class="row"><div class="grow"><div class="title">${esc(i.text)}</div><div class="sub">Inbox item</div></div><button class="iconBtn" data-action="deleteInbox" data-id="${i.id}">X</button></div><div class="actions"><button class="btn small secondary" data-action="inboxToTask" data-type="personal" data-id="${i.id}">Personal</button><button class="btn small secondary" data-action="inboxToTask" data-type="kala" data-id="${i.id}">Kala</button><button class="btn small secondary" data-action="inboxToTask" data-type="mandir" data-id="${i.id}">Mandir</button><button class="btn small" data-action="inboxToOrder" data-id="${i.id}">Order</button></div></div>`); return h+'</div>'}
function renderOrders(){const visible=state.data.orders.filter(o=>state.filter==='all'||(state.filter==='delivered'?o.stage==='Delivered':o.stage!=='Delivered')).filter(matchesSearch).sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999')); const total=visible.reduce((s,o)=>s+(parseFloat(o.price)||0),0); let h=`<div class="page">${pageTop('Orders','newOrder')}<input class="input search" id="searchBox" value="${esc(state.search)}" placeholder="Search orders"><div class="actions" style="margin-top:-4px;margin-bottom:14px"><button class="btn small ${state.filter==='active'?'':'secondary'}" data-filter="active">Active</button><button class="btn small ${state.filter==='all'?'':'secondary'}" data-filter="all">All</button><button class="btn small ${state.filter==='delivered'?'':'secondary'}" data-filter="delivered">Delivered</button></div><div class="sub" style="margin-bottom:12px">Shown total: $${total}</div>`; if(!visible.length)h+=`<div class="empty">No orders.</div>`; visible.forEach(o=>h+=orderCard(o)); return h+'</div>'}
function matchesSearch(o){const q=state.search.toLowerCase().trim(); if(!q)return true; return JSON.stringify(o).toLowerCase().includes(q)}
function orderCard(o){return `<div class="card"><div class="title">${esc(o.customer||'No customer yet')}</div><div class="sub">${esc(o.item)}</div><div class="chips">${chip(o.stage,'var(--purple)')}${o.dueDate?chip(fmt(o.dueDate)):''}${o.price?chip('$'+o.price,'var(--gold)'):''}${chip(o.source||'')}</div>${o.notes?`<div class="sub">${esc(o.notes)}</div>`:''}<div class="stageLine">${orderStages.map(s=>`<span class="stagePill ${s===o.stage?'active':''}">${s}</span>`).join('')}</div><div class="actions">${o.stage!=='Delivered'?`<button class="btn small" data-action="nextOrder" data-id="${o.id}">Next</button>`:''}<button class="btn small secondary" data-action="editOrder" data-id="${o.id}">Edit</button><button class="btn small danger" data-action="deleteOrder" data-id="${o.id}">Delete</button></div></div>`}
function renderBuilds(){let h=`<div class="page">${pageTop('Mandir Builds','newBuild')}`; if(!state.data.builds.length)h+=`<div class="empty">No builds.</div>`; state.data.builds.forEach(b=>{const done=(b.subtasks||[]).filter(s=>s.done).length, pct=(b.subtasks||[]).length?Math.round(done/b.subtasks.length*100):0; h+=`<div class="card"><div class="sub" style="color:var(--orange);font-weight:900">${esc(b.event)}</div><div class="title">${esc(b.buildName)}</div><div class="chips">${chip(b.status,'var(--orange)')}${b.section?chip(b.section):''}${b.date?chip(fmt(b.date)):''}</div>${b.notes?`<div class="sub">${esc(b.notes)}</div>`:''}${b.subtasks&&b.subtasks.length?`<div class="progress"><div class="progressFill" style="width:${pct}%"></div></div>`:''}<div class="actions"><button class="btn small" data-action="nextBuild" data-id="${b.id}">Next</button><button class="btn small secondary" data-action="editBuild" data-id="${b.id}">Edit</button><button class="btn small danger" data-action="deleteBuild" data-id="${b.id}">Delete</button></div></div>`}); return h+'</div>'}
function modalHtml(){if(!state.modal)return''; if(state.modal==='settings')return modal('Settings',`<div class="card"><div class="title">Backup</div><div class="sub">Data saves on this device. Export backups often.</div></div><div class="actions"><button class="btn" data-action="export">Export Backup</button><label class="btn secondary">Import Backup<input id="importFile" type="file" accept=".json" style="display:none"></label><button class="btn danger" data-action="resetSample">Reset to uploaded backup</button></div>`); if(state.modal==='task')return taskModal(); if(state.modal==='order')return orderModal(); if(state.modal==='build')return buildModal(); return''}
function modal(title,body){return `<div class="modalBg" data-action="closeModal"><div class="modal" onclick="event.stopPropagation()"><div class="modalTop"><div class="modalTitle">${title}</div><button class="iconBtn" data-action="closeModal">X</button></div>${body}</div></div>`}
function taskModal(){const t=state.editing||{id:uid(),title:'',category:'personal',dueDate:today(),status:'todo',pinned:false,notes:''}; return modal(state.editing?'Edit Task':'New Task',`<form id="taskForm">${field('Task',input('title',t.title,'text','What needs to be done?'))}${field('Category',`<select class="input" name="category">${['personal','kala','mandir','other'].map(c=>`<option ${t.category===c?'selected':''}>${c}</option>`).join('')}</select>`)}${field('Due Date',input('dueDate',t.dueDate,'date'))}${field('Notes',textarea('notes',t.notes,'Optional'))}<button class="btn" style="width:100%" data-action="saveTask">Save Task</button></form>`)}
function orderModal(){const o=state.editing||{id:uid(),customer:'',item:'',source:'Instagram DM',price:'',dueDate:'',stage:'Inquiry',notes:''}; return modal(state.editing?'Edit Order':'New Order',`<form id="orderForm">${field('Customer',input('customer',o.customer,'text','Customer name'))}${field('Item',input('item',o.item,'text','What are they ordering?'))}${field('Source',input('source',o.source))}${field('Price',input('price',o.price))}${field('Due Date',input('dueDate',o.dueDate,'date'))}${field('Stage',`<select class="input" name="stage">${orderStages.map(s=>`<option ${o.stage===s?'selected':''}>${s}</option>`).join('')}</select>`)}${field('Notes',textarea('notes',o.notes))}<button class="btn" style="width:100%" data-action="saveOrder">Save Order</button></form>`)}
function buildModal(){const b=state.editing||{id:uid(),event:'',buildName:'',section:'',status:'Idea',date:'',people:'',materials:'',notes:'',subtasks:[]}; return modal(state.editing?'Edit Build':'New Build',`<form id="buildForm">${field('Event',input('event',b.event,'text','Diwali 2026'))}${field('Build Name',input('buildName',b.buildName,'text','Sinhasan'))}${field('Section',input('section',b.section))}${field('Date',input('date',b.date,'date'))}${field('Status',`<select class="input" name="status">${buildStages.map(s=>`<option ${b.status===s?'selected':''}>${s}</option>`).join('')}</select>`)}${field('People',input('people',b.people))}${field('Materials',textarea('materials',b.materials))}${field('Notes',textarea('notes',b.notes))}<button class="btn" style="width:100%" data-action="saveBuild">Save Build</button></form>`)}
function values(form){return Object.fromEntries(new FormData(form).entries())}
function close(){state.modal=null;state.editing=null;render()}
function download(){const blob=new Blob([JSON.stringify(state.data,null,2)],{type:'application/json'}); const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='life-dashboard-backup-'+today()+'.json';a.click()}
function render(){try{const content=state.tab==='agenda'?renderAgenda():state.tab==='inbox'?renderInbox():state.tab==='orders'?renderOrders():renderBuilds(); layout(content)}catch(e){document.getElementById('app').innerHTML='<pre style="color:white;padding:20px;white-space:pre-wrap">'+esc(e.stack||e.message)+'</pre>'}}
document.addEventListener('click',e=>{const el=e.target.closest('[data-action],[data-tab],[data-filter]'); if(!el)return; const id=el.dataset.id, a=el.dataset.action; if(el.dataset.tab){state.tab=el.dataset.tab;render();return} if(el.dataset.filter){state.filter=el.dataset.filter;render();return} if(a==='settings'){state.modal='settings';render()} if(a==='closeModal')close(); if(a==='newTask'){state.modal='task';state.editing=null;render()} if(a==='newOrder'){state.modal='order';state.editing=null;render()} if(a==='newBuild'){state.modal='build';state.editing=null;render()} if(a==='editTask'){state.editing=state.data.tasks.find(x=>x.id===id);state.modal='task';render()} if(a==='editOrder'){state.editing=state.data.orders.find(x=>x.id===id);state.modal='order';render()} if(a==='editBuild'){state.editing=state.data.builds.find(x=>x.id===id);state.modal='build';render()} if(a==='saveTask'){e.preventDefault();const v=values(document.getElementById('taskForm')); const obj={...(state.editing||{id:uid(),status:'todo',pinned:false}),...v}; setData(d=>({...d,tasks:state.editing?d.tasks.map(x=>x.id===obj.id?obj:x):[obj,...d.tasks]})); close()} if(a==='saveOrder'){e.preventDefault();const v=values(document.getElementById('orderForm')); const obj={...(state.editing||{id:uid()}),...v}; setData(d=>({...d,orders:state.editing?d.orders.map(x=>x.id===obj.id?obj:x):[obj,...d.orders]})); close()} if(a==='saveBuild'){e.preventDefault();const v=values(document.getElementById('buildForm')); const obj={...(state.editing||{id:uid(),subtasks:[]}),...v}; setData(d=>({...d,builds:state.editing?d.builds.map(x=>x.id===obj.id?obj:x):[obj,...d.builds]})); close()} if(a==='toggleTask'){setData(d=>({...d,tasks:d.tasks.map(t=>t.id===id?{...t,status:t.status==='done'?'todo':'done'}:t)}))} if(a==='deleteOrder'&&confirm('Delete order?'))setData(d=>({...d,orders:d.orders.filter(x=>x.id!==id)})); if(a==='deleteBuild'&&confirm('Delete build?'))setData(d=>({...d,builds:d.builds.filter(x=>x.id!==id)})); if(a==='deleteInbox')setData(d=>({...d,inbox:d.inbox.filter(x=>x.id!==id)})); if(a==='nextOrder')setData(d=>({...d,orders:d.orders.map(o=>o.id===id?{...o,stage:orderStages[Math.min(orderStages.indexOf(o.stage)+1,orderStages.length-1)]}:o)})); if(a==='nextBuild')setData(d=>({...d,builds:d.builds.map(b=>b.id===id?{...b,status:buildStages[Math.min(buildStages.indexOf(b.status)+1,buildStages.length-1)]}:b)})); if(a==='addInbox'){const val=document.getElementById('quickInbox').value.trim(); if(val)setData(d=>({...d,inbox:[{id:uid(),text:val,createdAt:today(),pinned:false},...d.inbox]}))} if(a==='inboxToTask'){const item=state.data.inbox.find(x=>x.id===id); if(item)setData(d=>({...d,inbox:d.inbox.filter(x=>x.id!==id),tasks:[{id:uid(),title:item.text,category:el.dataset.type,dueDate:today(),status:'todo',pinned:false,notes:''},...d.tasks]}))} if(a==='inboxToOrder'){const item=state.data.inbox.find(x=>x.id===id); if(item)setData(d=>({...d,inbox:d.inbox.filter(x=>x.id!==id),orders:[{id:uid(),customer:'',item:item.text,source:'Quick Add',price:'',dueDate:'',stage:'Inquiry',notes:'Created from Inbox'},...d.orders]}))} if(a==='export')download(); if(a==='resetSample'&&confirm('Replace local data with uploaded backup?')){state.data=normalize(START_DATA);save();close()} });
document.addEventListener('input',e=>{if(e.target.id==='searchBox'){state.search=e.target.value;render()}});
document.addEventListener('change',e=>{if(e.target.id==='importFile'){const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=ev=>{try{state.data=normalize(JSON.parse(ev.target.result));save();close()}catch(err){alert('Bad JSON file')}}; r.readAsText(f)}});
window.addEventListener('error',e=>{document.getElementById('app').innerHTML='<pre style="color:white;padding:20px;white-space:pre-wrap">'+esc(e.error?.stack||e.message)+'</pre>'});
render();
})();
</script></body></html>
