<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Life Dashboard" />
<meta name="theme-color" content="#0f0f11" />
<title>Life Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --bg:#0f0f11;--surface:#18181c;--surface2:#222228;--border:#2a2a32;
  --text:#f0f0f2;--text2:#8888a0;--accent:#d4a853;--personal:#5b8cff;
  --kala:#c97cf4;--mandir:#f4a14e;--other:#4ecda4;--danger:#ff5f6d;--success:#3dd68c;
}
[data-light]{
  --bg:#f5f5f7;--surface:#ffffff;--surface2:#f0f0f4;--border:#e0e0e8;
  --text:#1a1a2e;--text2:#666680;--accent:#b8860b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
button,input,textarea,select{font-family:'Sora',sans-serif;font-size:16px}
button{touch-action:manipulation}
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;

const STORAGE_KEY='lifedash_v3_agenda';
const today=()=>new Date().toISOString().split('T')[0];
const daysFrom=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];};
const uid=()=>Math.random().toString(36).slice(2,10);
const load=()=>{try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'null')}catch{return null}};
const save=d=>localStorage.setItem(STORAGE_KEY,JSON.stringify(d));
const fmtDate=d=>{if(!d)return'';const x=new Date(d+'T00:00:00');return x.toLocaleDateString('en-US',{month:'short',day:'numeric'});};
const weekday=d=>{const x=new Date(d+'T00:00:00');return x.toLocaleDateString('en-US',{weekday:'short'});};
const isPast=d=>d&&d<today();
const isToday=d=>d===today();
const tomorrow=()=>daysFrom(1);
const catLabel={personal:'Personal',kala:'Kala',mandir:'Mandir',other:'Other'};
const catColor={personal:'var(--personal)',kala:'var(--kala)',mandir:'var(--mandir)',other:'var(--other)'};
const stageList=['Inquiry','Designing','Printing','Finishing','Packing','Shipped','Delivered'];
const stageColor={Inquiry:'#8888a0',Designing:'#5b8cff',Printing:'#f4a14e',Finishing:'#c97cf4',Packing:'#d4a853',Shipped:'#3dd68c',Delivered:'#4ecda4'};
const buildStatus=['Idea','Planning','Materials','Building','Ready','Done'];
const buildColor={Idea:'#8888a0',Planning:'#5b8cff',Materials:'#f4a14e',Building:'#c97cf4',Ready:'#d4a853',Done:'#3dd68c'};

const SAMPLE={
  inbox:[
    {id:'i1',text:'Call Dev about Diwali event',createdAt:today(),pinned:false},
    {id:'i2',text:'Need purple flowers for altar piece',createdAt:today(),pinned:false},
    {id:'i3',text:'Ship Megha order ASAP',createdAt:today(),pinned:true}
  ],
  tasks:[
    {id:'t1',title:'Call Dev about Diwali event',category:'personal',dueDate:today(),status:'todo',pinned:true,notes:''},
    {id:'t2',title:'Finish wedding box lid design',category:'kala',dueDate:today(),status:'todo',pinned:false,notes:'Purple with gold foil'},
    {id:'t3',title:'Order foam sheets 2 inch',category:'mandir',dueDate:daysFrom(2),status:'todo',pinned:false,notes:''},
    {id:'t4',title:'Reply to Priya about custom frame',category:'kala',dueDate:daysFrom(4),status:'todo',pinned:false,notes:''},
    {id:'t5',title:'Random idea: telescope illusion build',category:'other',dueDate:'',status:'todo',pinned:false,notes:''}
  ],
  orders:[
    {id:'o1',customer:'Megha Patel',item:'Wooden wedding box',source:'Instagram DM',price:'85',dueDate:today(),stage:'Finishing',notes:'Purple velvet lining, gold initials'},
    {id:'o2',customer:'Ravi & Sunita',item:'Ganesh 3D print',source:'Family',price:'45',dueDate:daysFrom(5),stage:'Printing',notes:'6 inch, white PLA'},
    {id:'o3',customer:'Anita Sharma',item:'Custom name frame',source:'Friend',price:'30',dueDate:daysFrom(10),stage:'Inquiry',notes:'Modern font, black frame'}
  ],
  builds:[
    {id:'b1',event:'Diwali 2026',buildName:'Sinhasan',section:'Sanctum',status:'Building',date:'2026-10-20',people:'Raj, Dev, Priya',notes:'Gold + cream theme',materials:'Foam, gold paint, fabric, MDF',subtasks:[
      {id:'s1',text:'Finalize design sketch',done:true},{id:'s2',text:'Buy foam',done:true},{id:'s3',text:'Print decorative parts',done:false},{id:'s4',text:'Paint gold',done:false}
    ]},
    {id:'b2',event:'Navratri 2026',buildName:'Stage Backdrop',section:'Hall',status:'Planning',date:'2026-10-02',people:'Dev, Meena',notes:'LED panel backdrop concept',materials:'PVC, LEDs, fabric',subtasks:[{id:'s5',text:'Get hall measurements',done:false}]}
  ]
};

function Icon({name,size=20,color='currentColor'}){
 const common={width:size,height:size,fill:'none',stroke:color,strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round',viewBox:'0 0 24 24'};
 const icons={
  agenda:<svg {...common}><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h8M8 18h5"/></svg>,
  inbox:<svg {...common}><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/></svg>,
  box:<svg {...common}><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>,
  temple:<svg {...common}><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/></svg>,
  plus:<svg {...common} strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  check:<svg {...common} strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>,
  x:<svg {...common} strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  pin:<svg {...common}><path d="M12 17v5M5 17h14l-2-7V4H7v6l-2 7z"/></svg>,
  edit:<svg {...common}><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  trash:<svg {...common}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>,
  search:<svg {...common}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  arrow:<svg {...common} strokeWidth="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  chevron:<svg {...common} strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>,
  download:<svg {...common}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  upload:<svg {...common}><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
 };
 return icons[name]||null;
}

function Chip({label,color='var(--text2)'}){return <span style={{background:color+'22',color,border:`1px solid ${color}44`,borderRadius:999,padding:'3px 8px',fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>{label}</span>}
function Btn({children,onClick,variant='primary',style={},disabled=false}){const s={primary:{background:'var(--accent)',color:'#0f0f11',border:'none'},secondary:{background:'var(--surface2)',color:'var(--text)',border:'1px solid var(--border)'},danger:{background:'var(--danger)22',color:'var(--danger)',border:'1px solid var(--danger)44'}};return <button disabled={disabled} onClick={onClick} style={{...s[variant],borderRadius:10,padding:'11px 16px',fontWeight:700,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',gap:6,cursor:disabled?'not-allowed':'pointer',opacity:disabled?.45:1,...style}}>{children}</button>}
function Field({label,children}){return <div style={{marginBottom:16}}><label style={{fontSize:12,fontWeight:800,color:'var(--text2)',textTransform:'uppercase',letterSpacing:.5,display:'block',marginBottom:7}}>{label}</label>{children}</div>}
function Input({value,onChange,placeholder,type='text',rows}){const style={width:'100%',background:'var(--surface2)',border:'1.5px solid var(--border)',borderRadius:10,padding:'12px 14px',color:'var(--text)',outline:'none',resize:'vertical'};return rows?<textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows} style={style}/>:<input type={type} value={value} onChange={onChange} placeholder={placeholder} style={style}/>}
function Modal({title,onClose,children}){return <div onClick={onClose} style={{position:'fixed',inset:0,background:'#000b',zIndex:1000,display:'flex',alignItems:'flex-end',justifyContent:'center'}}><div onClick={e=>e.stopPropagation()} style={{background:'var(--surface)',width:'100%',maxWidth:600,maxHeight:'90vh',overflowY:'auto',borderRadius:'22px 22px 0 0',padding:'12px 20px 40px'}}><div style={{width:44,height:5,borderRadius:9,background:'var(--border)',margin:'0 auto 18px'}}/><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}><h2 style={{fontSize:21}}>{title}</h2><button onClick={onClose} style={{background:'var(--surface2)',border:'none',borderRadius:10,padding:9,color:'var(--text2)'}}><Icon name="x" size={18}/></button></div>{children}</div></div>}

function TaskCard({task,setTasks}){
 const done=task.status==='done';
 const quickDate=(val)=>setTasks(ts=>ts.map(t=>t.id===task.id?{...t,dueDate:val}:t));
 return <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderLeft:`4px solid ${catColor[task.category]}`,borderRadius:15,marginBottom:10,overflow:'hidden',opacity:done?.55:1}}>
  <div style={{padding:14,display:'flex',gap:12,alignItems:'flex-start'}}>
   <button onClick={()=>setTasks(ts=>ts.map(t=>t.id===task.id?{...t,status:t.status==='done'?'todo':'done'}:t))} style={{width:25,height:25,borderRadius:7,border:done?'none':'2px solid var(--border)',background:done?'var(--success)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{done&&<Icon name="check" size={14} color="#fff"/>}</button>
   <div style={{flex:1,minWidth:0}}>
    <p style={{fontWeight:700,fontSize:15,lineHeight:1.35,textDecoration:done?'line-through':'none'}}>{task.title}</p>
    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:7}}>
     <Chip label={catLabel[task.category]} color={catColor[task.category]}/>{task.dueDate&&<Chip label={`${weekday(task.dueDate)} ${fmtDate(task.dueDate)}`} color={isPast(task.dueDate)&&!done?'var(--danger)':'var(--text2)'}/>} {task.pinned&&<Chip label="Pinned" color="var(--accent)"/>}
    </div>
    {task.notes&&<p style={{fontSize:13,color:'var(--text2)',marginTop:8,lineHeight:1.5}}>{task.notes}</p>}
    <div style={{display:'flex',gap:6,overflowX:'auto',marginTop:10,paddingBottom:2}}>
     <button onClick={()=>quickDate(today())} style={miniBtn}>Today</button>
     <button onClick={()=>quickDate(tomorrow())} style={miniBtn}>Tomorrow</button>
     <button onClick={()=>quickDate(daysFrom(3))} style={miniBtn}>+3d</button>
     <button onClick={()=>quickDate(daysFrom(7))} style={miniBtn}>Next wk</button>
     <button onClick={()=>quickDate('')} style={miniBtn}>No date</button>
     <input type="date" value={task.dueDate||''} onChange={e=>quickDate(e.target.value)} style={{...miniBtn,minWidth:132,color:'var(--text)'}} />
    </div>
   </div>
   <button onClick={()=>setTasks(ts=>ts.map(t=>t.id===task.id?{...t,pinned:!t.pinned}:t))} style={{background:'none',border:'none',color:task.pinned?'var(--accent)':'var(--text2)',padding:4}}><Icon name="pin" size={16}/></button>
  </div>
 </div>
}
const miniBtn={background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:'7px 10px',color:'var(--text2)',fontSize:12,fontWeight:700,whiteSpace:'nowrap'};

function AgendaTab({tasks,setTasks,openAddTask}){
 const pending=[...tasks].filter(t=>t.status!=='done').sort((a,b)=>{
  if(a.pinned!==b.pinned)return b.pinned-a.pinned;
  if(!a.dueDate&&!b.dueDate)return 0;
  if(!a.dueDate)return 1;if(!b.dueDate)return -1;
  return a.dueDate.localeCompare(b.dueDate);
 });
 const groups={Overdue:[],Today:[],Tomorrow:[], 'This Week':[], Upcoming:[], 'No Date':[]};
 pending.forEach(t=>{
  if(!t.dueDate)groups['No Date'].push(t);
  else if(t.dueDate<today())groups.Overdue.push(t);
  else if(t.dueDate===today())groups.Today.push(t);
  else if(t.dueDate===tomorrow())groups.Tomorrow.push(t);
  else if(t.dueDate<=daysFrom(7))groups['This Week'].push(t);
  else groups.Upcoming.push(t);
 });
 const order=['Overdue','Today','Tomorrow','This Week','Upcoming','No Date'];
 return <div style={{padding:'0 16px 104px'}}>
  <div style={{padding:'20px 0 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><div><p style={{fontSize:13,color:'var(--text2)',marginBottom:3}}>{new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</p><h1 style={{fontSize:28}}>Agenda</h1></div><div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,padding:'7px 12px',fontSize:13,color:'var(--text2)'}}>{pending.length} pending</div></div>
  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:18}}>
   <Stat label="Overdue" val={groups.Overdue.length} color="var(--danger)"/><Stat label="Today" val={groups.Today.length} color="var(--accent)"/>
  </div>
  {pending.length===0&&<Empty emoji="â¨" title="All clear" sub="Nothing pending"/>}
  {order.map(g=>groups[g].length?<div key={g} style={{marginBottom:23}}><div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}><h3 style={{fontSize:15,fontWeight:800,color:g==='Overdue'?'var(--danger)':'var(--text)'}}>{g}</h3><span style={{fontSize:12,color:'var(--text2)'}}>{groups[g].length}</span></div>{groups[g].map(t=><TaskCard key={t.id} task={t} setTasks={setTasks}/>)}</div>:null)}
  <button onClick={openAddTask} style={{position:'fixed',right:20,bottom:90,width:58,height:58,borderRadius:'50%',border:'none',background:'var(--accent)',color:'#0f0f11',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 4px 22px rgba(212,168,83,.4)'}}><Icon name="plus" size={26}/></button>
 </div>
}
function Stat({label,val,color}){return <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:14,padding:13}}><p style={{fontSize:12,color:'var(--text2)',fontWeight:700}}>{label}</p><p style={{fontSize:24,fontWeight:800,color}}>{val}</p></div>}
function Empty({emoji,title,sub}){return <div style={{textAlign:'center',padding:'60px 20px',color:'var(--text2)'}}><div style={{fontSize:48,marginBottom:12}}>{emoji}</div><p style={{fontWeight:800,color:'var(--text)'}}>{title}</p><p style={{fontSize:14,marginTop:4}}>{sub}</p></div>}

function InboxTab({inbox,setInbox,setTasks}){
 const [text,setText]=useState('');
 const add=()=>{if(!text.trim())return;setInbox(xs=>[{id:uid(),text:text.trim(),createdAt:today(),pinned:false},...xs]);setText('')};
 const categorize=(item,cat)=>{setInbox(xs=>xs.filter(x=>x.id!==item.id));if(cat==='done')return;setTasks(ts=>[{id:uid(),title:item.text,category:cat==='later'?'other':cat,dueDate:cat==='later'?'':today(),status:'todo',pinned:false,notes:''},...ts])};
 const sorted=[...inbox].sort((a,b)=>b.pinned-a.pinned);
 return <div style={{padding:'0 16px 104px'}}><h1 style={{fontSize:28,padding:'20px 0 16px'}}>Inbox</h1><div style={{background:'var(--surface)',border:'1.5px solid var(--accent)44',borderRadius:16,padding:14,marginBottom:18}}><div style={{display:'flex',gap:10}}><input value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="Quick note..." style={{flex:1,background:'transparent',border:'none',outline:'none',color:'var(--text)'}}/><Btn onClick={add} disabled={!text.trim()}>Add</Btn></div><p style={{fontSize:12,color:'var(--text2)',marginTop:8}}>Dump first. Sort later.</p></div>{sorted.length===0&&<Empty emoji="ð¬" title="Inbox empty" sub="Add a note above"/>}{sorted.map(item=><div key={item.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderLeft:item.pinned?'4px solid var(--accent)':'1px solid var(--border)',borderRadius:14,marginBottom:12,padding:14}}><div style={{display:'flex',gap:10}}><p style={{flex:1,fontWeight:600,lineHeight:1.4}}>{item.text}</p><button onClick={()=>setInbox(xs=>xs.map(x=>x.id===item.id?{...x,pinned:!x.pinned}:x))} style={{background:'none',border:'none',color:item.pinned?'var(--accent)':'var(--text2)'}}><Icon name="pin" size={15}/></button><button onClick={()=>setInbox(xs=>xs.filter(x=>x.id!==item.id))} style={{background:'none',border:'none',color:'var(--text2)'}}><Icon name="x" size={15}/></button></div><div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:12}}>{[['personal','Personal','var(--personal)'],['kala','Kala','var(--kala)'],['mandir','Mandir','var(--mandir)'],['later','Later','var(--text2)'],['done','Done','var(--success)']].map(([k,l,c])=><button key={k} onClick={()=>categorize(item,k)} style={{background:c+'18',color:c,border:`1px solid ${c}44`,borderRadius:8,padding:'7px 11px',fontSize:12,fontWeight:700}}>{l}</button>)}</div></div>)}</div>
}

function KalaTab({orders,setOrders}){
 const [show,setShow]=useState(false),[editing,setEditing]=useState(false),[filter,setFilter]=useState('active');
 const blank={id:'',customer:'',item:'',source:'Instagram DM',price:'',dueDate:'',stage:'Inquiry',notes:''};
 const [form,setForm]=useState(blank);const f=k=>e=>setForm(x=>({...x,[k]:e.target.value}));
 const openNew=()=>{setForm({...blank,id:uid()});setEditing(false);setShow(true)};const openEdit=o=>{setForm(o);setEditing(true);setShow(true)};
 const saveOrder=()=>{if(!form.customer||!form.item)return;if(editing)setOrders(os=>os.map(o=>o.id===form.id?form:o));else setOrders(os=>[form,...os]);setShow(false)};
 const remove=id=>confirm('Delete order?')&&setOrders(os=>os.filter(o=>o.id!==id));
 const next=id=>setOrders(os=>os.map(o=>{if(o.id!==id)return o;const i=stageList.indexOf(o.stage);return i<stageList.length-1?{...o,stage:stageList[i+1]}:o}));
 const filtered=filter==='all'?orders:filter==='done'?orders.filter(o=>['Shipped','Delivered'].includes(o.stage)):orders.filter(o=>!['Shipped','Delivered'].includes(o.stage));
 return <div style={{padding:'0 16px 104px'}}><TopTitle title="Kala Orders" onNew={openNew} color="var(--kala)"/><Filter current={filter} set={setFilter} items={[['active','Active'],['all','All'],['done','Done']]}/>{filtered.length===0&&<Empty emoji="ð¦" title="No orders" sub="Add one with New"/>}{filtered.map(o=><div key={o.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:16,marginBottom:14,overflow:'hidden'}}><div style={{background:stageColor[o.stage]+'18',borderBottom:'1px solid var(--border)',padding:'12px 16px',display:'flex',justifyContent:'space-between',gap:8}}><Chip label={o.stage} color={stageColor[o.stage]}/><div style={{display:'flex',gap:8}}>{o.dueDate&&<span style={{fontSize:12,color:isPast(o.dueDate)&&!['Shipped','Delivered'].includes(o.stage)?'var(--danger)':'var(--text2)',fontWeight:800}}>Due {fmtDate(o.dueDate)}</span>}{o.price&&<span style={{fontSize:12,color:'var(--accent)',fontWeight:800}}>${o.price}</span>}</div></div><div style={{padding:16}}><p style={{fontWeight:800,fontSize:16}}>{o.customer}</p><p style={{fontSize:14,color:'var(--text2)',marginTop:3}}>{o.item}</p><div style={{display:'flex',gap:6,marginTop:9,flexWrap:'wrap'}}><Chip label={o.source}/></div>{o.notes&&<p style={{fontSize:13,color:'var(--text2)',lineHeight:1.5,marginTop:10}}>{o.notes}</p>}</div><div style={{display:'flex',gap:8,padding:'12px 16px',borderTop:'1px solid var(--border)'}}>{o.stage!=='Delivered'&&<Btn onClick={()=>next(o.id)} variant="secondary" style={{flex:1,color:'var(--kala)'}}><Icon name="arrow" size={14}/> Move</Btn>}<Btn onClick={()=>openEdit(o)} variant="secondary"><Icon name="edit" size={16}/></Btn><Btn onClick={()=>remove(o.id)} variant="danger"><Icon name="trash" size={16}/></Btn></div></div>)}{show&&<Modal title={editing?'Edit Order':'New Order'} onClose={()=>setShow(false)}><Field label="Customer"><Input value={form.customer} onChange={f('customer')} placeholder="Name"/></Field><Field label="Item"><Input value={fo function MandirTab({builds,setBuilds}){
 const [show,setShow]=useState(false),[editing,setEditing]=useState(false),[expanded,setExpanded]=useState({});
 const blank={id:'',event:'',buildName:'',section:'',status:'Idea',date:'',people:'',notes:'',materials:'',subtasks:[]};
 const [form,setForm]=useState(blank);const f=k=>e=>setForm(x=>({...x,[k]:e.target.value}));

function BuildCard({b,exp,toggle,edit,del,advance,toggleSub,addSub,remSub}){

 return <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderLeft:`4px solid ${buildColor[b.status]}`,borderRadius:16,marginBottom:14,overflow:'hidden'}}><div style={{padding:16}}><div style={{display:'flex',justifyContent:'space-between',gap:10}}><div><p style={{fontSize:11,color:'var(--mandir)',fontWeight:800,textTransform:'uppercase',letterSpacing:.5}}>{b.event}</p><p style={{fontWeight:800,fontSize:16,margin:'3px 0 7px'}}>{b.buildName}</p><div style={{display:'flex',gap:6,flexWrap:'wrap'}}><Chip label={b.status} color={buildColor[b.status]}/>{b.section&&<Chip label={b.section}/>} {b.date&&<Chip label={fmtDate(b.date)}/>}</div></div><button onClick={toggle} style={{alignSelf:'start',background:'var(--surface2)',border:'none',borderRadius:8,padding:8,color:'var(--text2)'}}><Icon name="chevron" size={16}/></button></div>{b.subtasks.length>0&&<div style={{marginTop:12}}><div style={{display:'flex',justifyContent:'space-between',fontSize:12,color:'var(--text2)',marginBottom:4}}><span>{done}/{b.subtasks.length} subtasks</span><b style={{color:'var(--mandir)'}}>{pct}%</b></div><div style={{height:5,borderRadius:8,background:'var(--surface2)'}}><div style={{height:5,borderRadius:8,background:buildColor[b.status],width:pct+'%'}}/></div></div>}</div>{exp&&<div style={{borderTop:'1px solid var(--border)',padding:16}}>{b.people&&<p style={{fontSize:13,color:'var(--text2)',marginBottom:8}}>People: {b.people}</p>}{b.materials&&<p style={{fontSize:13,color:'var(--text2)',marginBottom:8}}>Materials: {b.materials}</p>}{b.notes&&<p style={{fontSize:13,color:'var(--text2)',lineHeight:1.5,marginBottom:12}}>{b.notes}</p>}<p style={{fontSize:12,fontWeight:800,color:'var(--text2)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Subtasks</p>{b.subtasks.map(s=><div key={s.id} style={{display:'flex',alignItems:'center',gap:9,padding:'7px 0',borderBottom:'1px solid var(--border)'}}><button onClick={()=>toggleSub(s.id)} style={{width:21,height:21,bord }

function AddTaskModal({onClose,onSave}){const [form,setForm]=useState({title:'',category:'personal',dueDate:today(),notes:'',pinned:false});const f=k=>e=>setForm(x=>({...x,[k]:e.target.value}));const saveIt=()=>{if(!form.title.trim())return;onSave({id:uid(),...form,status:'todo'});onClose()};return <Modal title="New Task" onClose={onClose}><Field label="Task"><Input value={form.title} onChange={f('title')} placeholder="What needs to be done?"/></Field><Field label="Category"><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>{Object.entries(catLabel).map(([k,l])=><button key={k} onClick={()=>setForm(x=>({...x,category:k}))} style={{background:form.category===k?catColor[k]+'33':'var(--surface2)',color:form.category===k?catColor[k]:'var(--text2)',border:`1px solid ${form.category===k?catColor[k]:'var(--border)'}`,borderRadius:10,padding:'11px 8px',fontSize:13,fontWeight:800}}>{l}</button>)}</div></Field><Field label="Quick Date"><div style={{display:'flex',gap:7,flexWrap:'wrap'}}>{[['Today',today()],['Tomorrow',tomorrow()],['+3 days',daysFrom(3)],['Next week',daysFrom(7)],['No date','']].map(([l,v])=><button key={l} onClick={()=>setForm(x=>({...x,dueDate:v}))} style={{...miniBtn,color:form.dueDate===v?'var(--accent)':'var(--text2)',borderColor:form.dueDate===v?'var(--accent)':'var(--border)'}}>{l}</button>)}</div></Field><Field label="Custom Date"><Input type="date" value={form.dueDate} onChange={f('dueDate')}/></Field><Field label="Notes"><Input rows={2} value={form.notes} onChange={f('notes')} placeholder="Optional"/></Field><Btn onClick={saveIt} style={{width:'100%'}}>Add Task</Btn></Modal>}

function SettingsModal({onClose,data,setData,dark,setDark}){const fileRef=useRef();const exportData=()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`lifedash-backup-${today()}.json`;a.click()};const importData=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{setData(JSON.parse(ev.target.result));alert('Imported!');onClose()}catch{alert('Invalid file')}};r.readAsText(file);e.target.value=''};return <Modal title="Settings" onClose={onClose}><Field label="Appearance"><Btn variant="secondary" onClick={()=>setDark(!dark)} style={{width:'100%'}}>{dark?'Switch to Light Mode':'Switch to Dark Mode'}</Btn></Field><Field label="Backup"><div style={{display:'grid',gap:10}}><Btn variant="secondary" onClick={exportData}><Icon name="download" size={18}/>Export JSON Backup</Btn><Btn variant="secondary" onClick={()=>fileRef.current.click()}><Icon name="upload" size={18}/>Import JSON Backup</Btn><input ref={fileRef} type="file" accept=".json" onChange={importData} style={{display:'none'}}/></div></Field><div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:12,padding:14}}><p style={{fontWeight:800,marginBottom:6}}>Install as app</p><p style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>In Safari: Share â Add to Home Screen.</p></div></Modal>}

function App(){
