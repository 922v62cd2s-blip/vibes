
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Life Dashboard"/>
<meta name="theme-color" content="#0f0f11"/>
<title>Life Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
--bg:#0f0f11;
--card:#18181c;
--card2:#23232a;
--border:#303038;
--text:#f4f4f6;
--muted:#9a9aaa;
--gold:#d4a853;
--blue:#5b8cff;
--purple:#c97cf4;
--orange:#f4a14e;
--green:#3dd68c;
--red:#ff5f6d;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
min-height:100vh;
}
button,input,textarea,select{
font-family:inherit;
font-size:16px;
}
button{cursor:pointer}
.app{
max-width:620px;
margin:0 auto;
min-height:100vh;
padding-bottom:86px;
}
.header{
position:sticky;
top:0;
z-index:20;
background:rgba(15,15,17,.95);
backdrop-filter:blur(16px);
border-bottom:1px solid var(--border);
padding:14px 16px;
display:flex;
align-items:center;
justify-content:space-between;
}
.brand{
font-weight:800;
font-size:18px;
}
.headerBtns{display:flex;gap:8px}
.iconBtn{
background:var(--card);
color:var(--text);
border:1px solid var(--border);
border-radius:10px;
padding:8px 11px;
font-weight:700;
}
.page{
padding:18px 16px;
}
.pageTitle{
font-size:30px;
font-weight:800;
margin-bottom:16px;
}
.card{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:14px;
margin-bottom:12px;
}
.sectionTitle{
font-size:12px;
font-weight:800;
color:var(--muted);
text-transform:uppercase;
letter-spacing:.7px;
margin:22px 0 10px;
}
.row{
display:flex;
gap:10px;
align-items:flex-start;
}
.grow{flex:1;min-width:0}
.title{
font-weight:700;
font-size:15px;
line-height:1.35;
}
.sub{
color:var(--muted);
font-size:13px;
line-height:1.4;
margin-top:4px;
}
.chips{
display:flex;
gap:6px;
flex-wrap:wrap;
margin-top:8px;
}
.chip{
font-size:11px;
font-weight:700;
border-radius:999px;
padding:4px 8px;
background:var(--card2);
color:var(--muted);
border:1px solid var(--border);
}
.btn{
border:none;
border-radius:10px;
padding:10px 14px;
font-weight:800;
background:var(--gold);
color:#111;
}
.btn.secondary{
background:var(--card2);
color:var(--text);
border:1px solid var(--border);
}
.btn.danger{
background:rgba(255,95,109,.15);
color:var(--red);
border:1px solid rgba(255,95,109,.35);
}
.btn.small{
font-size:13px;
padding:7px 10px;
}
.input{
width:100%;
background:var(--card2);
color:var(--text);
border:1px solid var(--border);
border-radius:12px;
padding:12px;
outline:none;
}
textarea.input{min-height:82px;resize:vertical}
.field{margin-bottom:13px}
.label{
display:block;
font-size:12px;
font-weight:800;
color:var(--muted);
text-transform:uppercase;
letter-spacing:.6px;
margin-bottom:6px;
}
.checkbox{
width:24px;
height:24px;
border-radius:7px;
border:2px solid var(--border);
background:transparent;
color:white;
display:flex;
align-items:center;
justify-content:center;
flex-shrink:0;
font-weight:900;
}
.checkbox.done{
background:var(--green);
border-color:var(--green);
}
.actions{
display:flex;
gap:8px;
flex-wrap:wrap;
margin-top:12px;
}
.bottomNav{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
z-index:30;
width:100%;
max-width:620px;
background:rgba(15,15,17,.97);
backdrop-filter:blur(16px);
border-top:1px solid var(--border);
display:flex;
padding-bottom:env(safe-area-inset-bottom);
}
.navBtn{
flex:1;
border:0;
background:transparent;
color:var(--muted);
padding:10px 0 8px;
font-size:11px;
font-weight:700;
}
.navBtn.active{color:var(--gold)}
.navIcon{font-size:19px;display:block;margin-bottom:3px}
.quick{
background:var(--card);
border:1px solid rgba(212,168,83,.5);
border-radius:16px;
padding:14px;
margin-bottom:16px;
}
.quickRow{
display:flex;
gap:8px;
}
.modalBg{
position:fixed;
inset:0;
background:rgba(0,0,0,.72);
z-index:100;
display:flex;
align-items:flex-end;
}
.modal{
width:100%;
max-width:620px;
margin:0 auto;
background:var(--card);
border-radius:20px 20px 0 0;
max-height:90vh;
overflow:auto;
padding:18px 16px 34px;
}
.modalTop{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}
.modalTitle{
font-size:21px;
font-weight:900;
}
.progress{
height:5px;
background:var(--card2);
border-radius:99px;
overflow:hidden;
margin-top:10px;
}
.progressFill{
height:100%;
background:var(--orange);
}
.stageLine{
display:flex;
gap:5px;
overflow-x:auto;
padding-bottom:3px;
margin-top:10px;
}
.stagePill{
font-size:10px;
font-weight:800;
border-radius:8px;
padding:5px 8px;
background:var(--card2);
color:var(--muted);
white-space:nowrap;
}
.stagePill.active{
background:var(--purple);
color:white;
}
.empty{
text-align:center;
color:var(--muted);
padding:50px 10px;
}
.undo{
position:fixed;
left:16px;
right:16px;
bottom:88px;
z-index:80;
max-width:590px;
margin:0 auto;
background:var(--card2);
border:1px solid var(--border);
border-radius:14px;
padding:13px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 8px 30px rgba(0,0,0,.4);
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const KEY="life_dashboard_clean_v1";
const today=()=>new Date().toISOString().split("T")[0];
const daysFrom=(n)=>{
const d=new Date();
d.setDate(d.getDate()+n);
return d.toISOString().split("T")[0];
};
const fmt=(date)=>{
if(!date)return"";
const d=new Date(date+"T00:00:00");
return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
};
const uid=()=>Math.random().toString(36).slice(2,10);
const load=()=>{
try{
return JSON.parse(localStorage.getItem(KEY))||null;
}catch{
return null;
}
};
const save=(data)=>{
localStorage.setItem(KEY,JSON.stringify(data));
};
const SAMPLE={
inbox:[
{id:"i1",text:"Call Dev about Diwali meeting",createdAt:today(),pinned:false},
{id:"i2",text:"Megha wedding box order 85 dollars",createdAt:today(),pinned:true}
],
tasks:[
{id:"t1",title:"Finish wedding box lid",category:"Kala",dueDate:today(),status:"todo",pinned:true,notes:"Gold initials"},
{id:"t2",title:"Buy foam sheets",category:"Mandir",dueDate:daysFrom(1),status:"todo",pinned:false,notes:"For sinhasan"},
{id:"t3",title:"Gym",category:"Personal",dueDate:today(),status:"todo",pinned:false,notes:""}
],
orders:[
{id:"o1",customer:"Megha",item:"Wedding box",source:"Instagram DM",price:"85",dueDate:today(),stage:"Finishing",notes:"Purple velvet lining"},
{id:"o2",customer:"Ravi",item:"Ganesh print",source:"Family",price:"45",dueDate:daysFrom(4),stage:"Printing",notes:"White PLA"},
{id:"o3",customer:"Unknown",item:"Inquiry from Instagram",source:"Quick Add",price:"",dueDate:"",stage:"Inquiry",notes:"Need details"}
],
builds:[
{id:"b1",event:"Diwali 2026",buildName:"Sinhasan",section:"Main",status:"Building",date:daysFrom(20),people:"Dev, Raj",materials:"Foam, gold paint, MDF",notes:"Gold and cream theme",subtasks:[
{id:"s1",text:"Finalize design",done:true},
{id:"s2",text:"Buy foam",done:false},
{id:"s3",text:"Paint parts",done:false}
]},
{id:"b2",event:"Navratri 2026",buildName:"Stage backdrop",section:"Hall",status:"Planning",date:daysFrom(12),people:"",materials:"PVC, fabric",notes:"",subtasks:[]}
]
};
const taskColors={
Personal:"var(--blue)",
Kala:"var(--purple)",
Mandir:"var(--orange)",
Other:"var(--green)"
};
const orderStages=["Inquiry","Designing","Printing","Finishing","Packing","Shipped","Delivered"];
const buildStages=["Idea","Planning","Materials","Building","Ready","Done"];
function Chip({children,color}){
return <span className="chip" style={{color:color||"var(--muted)"}}>{children}</span>;
}
function Modal({title,onClose,children}){
return(
<div className="modalBg" onClick={onClose}>
<div className="modal" onClick={e=>e.stopPropagation()}>
<div className="modalTop">
<div className="modalTitle">{title}</div>
<button className="iconBtn" onClick={onClose}>X</button>
</div>
{children}
</div>
</div>
);
}
function Field({label,children}){
return <div className="field"><label className="label">{label}</label>{children}</div>;
}
function Input(props){
return <input className="input" {...props}/>;
}
function TextArea(props){
return <textarea className="input" {...props}/>;
}
function groupByDate(items,dateKey="dueDate"){
const grouped={
Overdue:[],
Today:[],
Tomorrow:[],
"This Week":[],
Upcoming:[],
"No Date":[]
};
items.forEach(item=>{
const d=item[dateKey];
if(!d){
grouped["No Date"].push(item);
return;
}
if(d<today()){
grouped.Overdue.push(item);
return;
}
if(d===today()){
grouped.Today.push(item);
return;
}
if(d===daysFrom(1)){
grouped.Tomorrow.push(item);
return;
}
const diff=(new Date(d)-new Date(today()))/(1000*60*60*24);
if(diff<=7){
grouped["This Week"].push(item);
}else{
grouped.Upcoming.push(item);
}
});
return grouped;
}
function Agenda({tasks,setTasks,setUndo,openTask}){
const pending=tasks
.filter(t=>t.status!=="done")
.sort((a,b)=>{
if(!a.dueDate)return 1;
if(!b.dueDate)return -1;
return a.dueDate.localeCompare(b.dueDate);
});
const grouped=groupByDate(pending);
const toggle=(id)=>{
let old=null;
setTasks(ts=>ts.map(t=>{
if(t.id!==id)return t;
old={...t};
return {...t,status:"done",completedAt:today()};
}));
setUndo(old);
};
const changeDate=(id,date)=>{
setTasks(ts=>ts.map(t=>t.id===id?{...t,dueDate:date}:t));
};
return(
<div className="page">
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<h1 className="pageTitle">Agenda</h1>
<button className="btn" onClick={openTask}>Add</button>
</div>
{pending.length===0&&<div className="empty">Nothing pending.</div>}
{Object.entries(grouped).map(([section,items])=>{
if(!items.length)return null;
return(
<div key={section}>
<div className="sectionTitle">{section}</div>
{items.map(task=>(
<TaskCard
key={task.id}
task={task}
toggle={toggle}
changeDate={changeDate}
setTasks={setTasks}
/>
))}
</div>
);
})}
</div>
);
}
function TaskCard({task,toggle,changeDate,setTasks}){
const [open,setOpen]=useState(false);
const [custom,setCustom]=useState(false);
return(
<div className="card">
<div className="row">
<button className="checkbox" onClick={()=>toggle(task.id)}></button>
<div className="grow" onClick={()=>setOpen(!open)}>
<div className="title">{task.title}</div>
<div className="chips">
<Chip color={taskColors[task.category]}>{task.category}</Chip>
{task.dueDate&&<Chip>{fmt(task.dueDate)}</Chip>}
{task.pinned&&<Chip color="var(--gold)">Pinned</Chip>}
</div>
{task.notes&&<div className="sub">{task.notes}</div>}
</div>
<button className="iconBtn" onClick={()=>setTasks(ts=>ts.map(t=>t.id===task.id?{...t,pinned:!t.pinned}:t))}>Pin</button>
</div>
{open&&(
<div className="actions">
<button className="btn small secondary" onClick={()=>changeDate(task.id,today())}>Today</button>
<button className="btn small secondary" onClick={()=>changeDate(task.id,daysFrom(1))}>Tomorrow</button>
<button className="btn small secondary" onClick={()=>changeDate(task.id,daysFrom(3))}>+3 days</button>
<button className="btn small secondary" onClick={()=>changeDate(task.id,daysFrom(7))}>Next week</button>
<button className="btn small secondary" onClick={()=>changeDate(task.id,"")}>No date</button>
<button className="btn small secondary" onClick={()=>setCustom(!custom)}>Custom</button>
{custom&&<Input type="date" value={task.dueDate||""} onChange={e=>changeDate(task.id,e.target.value)}/>}
</div>
)}
</div>
);
}
function Inbox({inbox,setInbox,setTasks,setOrders}){
const [text,setText]=useState("");
const add=()=>{
if(!text.trim())return;
setInbox(items=>[{id:uid(),text:text.trim(),createdAt:today(),pinned:false},...items]);
setText("");
};
const remove=(id)=>{
setInbox(items=>items.filter(i=>i.id!==id));
};
const categorize=(item,type)=>{
remove(item.id);
if(type==="done")return;
if(type==="order"){
setOrders(os=>[{
id:uid(),
customer:"",
item:item.text,
source:"Quick Add",
price:"",
dueDate:"",
stage:"Inquiry",
notes:"Created from Inbox"
},...os]);
return;
}
const category=type==="later"?"Other":type;
setTasks(ts=>[{
id:uid(),
title:item.text,
category,
dueDate:type==="later"?"":today(),
status:"todo",
pinned:false,
notes:""
},...ts]);
};
return(
<div className="page">
<h1 className="pageTitle">Inbox</h1>
<div className="quick">
<div className="quickRow">
<input className="input" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")add();}} placeholder="Quick dump anything..."/>
<button className="btn" onClick={add}>Add</button>
</div>
<div className="sub">Fast capture tasks or orders. Sort later.</div>
</div>
{inbox.length===0&&<div className="empty">Inbox empty.</div>}
{inbox.map(item=>(
<div className="card" key={item.id}>
<div className="row">
<div className="grow">
<div className="title">{item.text}</div>
<div className="sub">Inbox item</div>
</div>
<button className="iconBtn" onClick={()=>remove(item.id)}>X</button>
</div>
<div className="actions">
<button className="btn small secondary" onClick={()=>categorize(item,"Personal")}>Personal</button>
<button className="btn small secondary" onClick={()=>categorize(item,"Kala")}>Kala Task</button>
<button className="btn small secondary" onClick={()=>categorize(item,"Mandir")}>Mandir</button>
<button className="btn small" onClick={()=>categorize(item,"order")}>Order</button>
<button className="btn small secondary" onClick={()=>categorize(item,"later")}>Later</button>
<button className="btn small secondary" onClick={()=>categorize(item,"done")}>Done</button>
</div>
</div>
))}
</div>
);
}
function Orders({orders,setOrders}){
const [show,setShow]=useState(false);
const [edit,setEdit]=useState(null);
const [filter,setFilter]=useState("active");
const active=o=>!["Delivered"].includes(o.stage);
const visible=orders.filter(o=>{
if(filter==="all")return true;
if(filter==="active")return active(o);
if(filter==="delivered")return o.stage==="Delivered";
return true;
}).sort((a,b)=>{
if(!a.dueDate)return 1;
if(!b.dueDate)return -1;
return a.dueDate.localeCompare(b.dueDate);
});
const grouped=groupByDate(visible);
grouped.Delivered=visible.filter(o=>o.stage==="Delivered");
Object.keys(grouped).forEach(k=>{
if(k!=="Delivered"){
grouped[k]=grouped[k].filter(o=>o.stage!=="Delivered");
}
});
const nextStage=(id)=>{
setOrders(os=>os.map(o=>{
if(o.id!==id)return o;
const i=orderStages.indexOf(o.stage);
return {...o,stage:orderStages[Math.min(i+1,orderStages.length-1)]};
}));
};
const remove=(id)=>{
if(confirm("Delete order?")){
setOrders(os=>os.filter(o=>o.id!==id));
}
};
return(
<div className="page">
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<h1 className="pageTitle">Orders</h1>
<button className="btn" onClick={()=>{setEdit(null);setShow(true);}}>Add</button>
</div>
<div className="actions" style={{marginTop:-8,marginBottom:14}}>
<button className={"btn small "+(filter==="active"?"":"secondary")} onClick={()=>setFilter("active")}>Active</button>
<button className={"btn small "+(filter==="all"?"":"secondary")} onClick={()=>setFilter("all")}>All</button>
<button className={"btn small "+(filter==="delivered"?"":"secondary")} onClick={()=>setFilter("delivered")}>Delivered</button>
</div>
{visible.length===0&&<div className="empty">No orders.</div>}
{Object.entries(grouped).map(([section,items])=>{
if(!items.length)return null;
return(
<div key={section}>
<div className="sectionTitle">{section}</div>
{items.map(order=>(
<OrderCard
key={order.id}
order={order}
nextStage={nextStage}
onEdit={()=>{setEdit(order);setShow(true);}}
onDelete={()=>remove(order.id)}
/>
))}
</div>
);
})}
{show&&(
<OrderModal
order={edit}
onClose={()=>setShow(false)}
onSave={(order)=>{
if(edit){
setOrders(os=>os.map(o=>o.id===order.id?order:o));
}else{
setOrders(os=>[order,...os]);
}
setShow(false);
}}
/>
)}
</div>
);
}
function OrderCard({order,nextStage,onEdit,onDelete}){
return(
<div className="card">
<div className="row">
<div className="grow">
<div className="title">{order.customer||"No customer yet"}</div>
<div className="sub">{order.item}</div>
<div className="chips">
<Chip color="var(--purple)">{order.stage}</Chip>
{order.dueDate&&<Chip>{fmt(order.dueDate)}</Chip>}
{order.price&&<Chip color="var(--gold)">${order.price}</Chip>}
<Chip>{order.source}</Chip>
</div>
{order.notes&&<div className="sub">{order.notes}</div>}
</div>
</div>
<div className="stageLine">
{orderStages.map(s=><span key={s} className={"stagePill "+(s===order.stage?"active":"")}>{s}</span>)}
</div>
<div className="actions">
{order.stage!=="Delivered"&&<button className="btn small" onClick={()=>nextStage(order.id)}>Next</button>}
<button className="btn small secondary" onClick={onEdit}>Edit</button>
<button className="btn small danger" onClick={onDelete}>Delete</button>
</div>
</div>
);
}
function OrderModal({order,onSave,onClose}){
const [form,setForm]=useState(order||{
id:uid(),
customer:"",
item:"",
source:"Instagram DM",
price:"",
dueDate:"",
stage:"Inquiry",
notes:""
});
const f=k=>e=>setForm(x=>({...x,[k]:e.target.value}));
return(
<Modal title={order?"Edit Order":"New Order"} onClose={onClose}>
<Field label="Customer"><Input value={form.customer} onChange={f("customer")} placeholder="Customer name"/></Field>
<Field label="Item"><Input value={form.item} onChange={f("item")} placeholder="What are they ordering?"/></Field>
<Field label="Source"><Input value={form.source} onChange={f("source")} placeholder="Instagram DM, family, etc."/></Field>
<Field label="Price"><Input value={form.price} onChange={f("price")} placeholder="85"/></Field>
<Field label="Due Date"><Input type="date" value={form.dueDate} onChange={f("dueDate")}/></Field>
<Field label="Stage">
<select className="input" value={form.stage} onChange={f("stage")}>
{orderStages.map(s=><option key={s}>{s}</option>)}
</select>
</Field>
<Field label="Notes"><TextArea value={form.notes} onChange={f("notes")} placeholder="Details"/></Field>
<button className="btn" style={{width:"100%"}} onClick={()=>onSave(form)}>Save Order</button>
</Modal>
);
}
function Builds({builds,setBuilds}){
const [show,setShow]=useState(false);
const [edit,setEdit]=useState(null);
const [open,setOpen]=useState({});
const remove=(id)=>{
if(confirm("Delete build?")){
setBuilds(bs=>bs.filter(b=>b.id!==id));
}
};
const next=(id)=>{
setBuilds(bs=>bs.map(b=>{
if(b.id!==id)return b;
const i=buildStages.indexOf(b.status);
return {...b,status:buildStages[Math.min(i+1,buildStages.length-1)]};
}));
};
const toggleSub=(bid,sid)=>{
setBuilds(bs=>bs.map(b=>b.id!==bid?b:{...b,subtasks:b.subtasks.map(s=>s.id===sid?{...s,done:!s.done}:s)}));
};
const addSub=(bid,text)=>{
if(!text.trim())return;
setBuilds(bs=>bs.map(b=>b.id!==bid?b:{...b,subtasks:[...b.subtasks,{id:uid(),text:text.trim(),done:false}]}));
};
return(
<div className="page">
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<h1 className="pageTitle">Mandir Builds</h1>
<button className="btn" onClick={()=>{setEdit(null);setShow(true);}}>Add</button>
</div>
{builds.length===0&&<div className="empty">No builds.</div>}
{builds.map(build=>(
<BuildCard
key={build.id}
build={build}
open={!!open[build.id]}
toggleOpen={()=>setOpen(o=>({...o,[build.id]:!o[build.id]}))}
next={()=>next(build.id)}
edit={()=>{setEdit(build);setShow(true);}}
remove={()=>remove(build.id)}
toggleSub={sid=>toggleSub(build.id,sid)}
addSub={text=>addSub(build.id,text)}
/>
))}
{show&&(
<BuildModal
build={edit}
onClose={()=>setShow(false)}
onSave={(b)=>{
if(edit){
setBuilds(bs=>bs.map(x=>x.id===b.id?b:x));
}else{
setBuilds(bs=>[b,...bs]);
}
setShow(false);
}}
/>
)}
</div>
);
}
function BuildCard({build,open,toggleOpen,next,edit,remove,toggleSub,addSub}){
const [newSub,setNewSub]=useState("");
const done=build.subtasks.filter(s=>s.done).length;
const pct=build.subtasks.length?Math.round(done/build.subtasks.length*100):0;
return(
<div className="card">
<div className="row">
<div className="grow" onClick={toggleOpen}>
<div className="sub" style={{color:"var(--orange)",fontWeight:800}}>{build.event}</div>
<div className="title">{build.buildName}</div>
<div className="chips">
<Chip color="var(--orange)">{build.status}</Chip>
{build.section&&<Chip>{build.section}</Chip>}
{build.date&&<Chip>{fmt(build.date)}</Chip>}
</div>
</div>
<button className="iconBtn" onClick={toggleOpen}>{open?"Up":"Down"}</button>
</div>
{build.subtasks.length>0&&(
<div className="progress">
<div className="progressFill" style={{width:pct+"%"}}></div>
</div>
)}
{open&&(
<div style={{marginTop:12}}>
{build.people&&<div className="sub">People: {build.people}</div>}
{build.materials&&<div className="sub">Materials: {build.materials}</div>}
{build.notes&&<div className="sub">{build.notes}</div>}
<div className="sectionTitle">Subtasks</div>
{build.subtasks.map(s=>(
<div key={s.id} className="row" style={{marginBottom:8}}>
<button className={"checkbox "+(s.done?"done":"")} onClick={()=>toggleSub(s.id)}>{s.done?"✓":""}</button>
<div className="grow title" style={{fontSize:14,textDecoration:s.done?"line-through":"none",color:s.done?"var(--muted)":"var(--text)"}}>{s.text}</div>
</div>
))}
<div className="quickRow" style={{marginTop:10}}>
<input className="input" value={newSub} onChange={e=>setNewSub(e.target.value)} placeholder="Add subtask"/>
<button className="btn" onClick={()=>{addSub(newSub);setNewSub("");}}>Add</button>
</div>
<div className="actions">
{build.status!=="Done"&&<button className="btn small" onClick={next}>Next</button>}
<button className="btn small secondary" onClick={edit}>Edit</button>
<button className="btn small danger" onClick={remove}>Delete</button>
</div>
</div>
)}
</div>
);
}

<select className="input" value={form.status} onChange={f("status")}>
{buildStages.map(s=><option key={s}>{s}</option>)}

function Settings({data,setData,onClose}){
const exportData=()=>{
const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="life-dashboard-backup-"+today()+".json";
a.click();
};
const importData=e=>{
const file=e.target.files[0];
if(!file)return;
const reader=new FileReader();
reader.onload=ev=>{
try{
setData(JSON.parse(ev.target.result));
alert("Imported");
onClose();
}catch{
alert("Bad file");
}
};
reader.readAsText(file);
};
return(
<Modal title="Settings" onClose={onClose}>
<div className="card">
<div className="title">Install as app</div>
<div className="sub">Open in Safari, tap Share, then Add to Home Screen.</div>
</div>
<div className="actions">
<button className="btn" onClick={exportData}>Export Backup</button>
<label className="btn secondary">
Import Backup
<input type="file" accept=".json" style={{display:"none"}} onChange={importData}/>
</label>
</div>
<div className="card" style={{marginTop:14}}>
<div className="title">Data note</div>
<div className="sub">This app saves data on this phone/browser using local storage. Export backups often.</div>
</div>
</Modal>
);
}
function App(){
const [data,setDataRaw]=useState(()=>load()||SAMPLE);
const [tab,setTab]=useState("agenda");
const [settings,setSettings]=useState(false);
const [taskModal,setTaskModal]=useState(false);
const [undo,setUndo]=useState(null);
useEffect(()=>save(data),[data]);
const setData=next=>{
setDataRaw(prev=>typeof next==="function"?next(prev):next);
};
const setInbox=fn=>setData(d=>({...d,inbox:typeof fn==="function"?fn(d.inbox):fn}));
const setTasks=fn=>setData(d=>({...d,tasks:typeof fn==="function"?fn(d.tasks):fn}));
const setOrders=fn=>setData(d=>({...d,orders:typeof fn==="function"?fn(d.orders):fn}));
const setBuilds=fn=>setData(d=>({...d,builds:typeof fn==="function"?fn(d.builds):fn}));
useEffect(()=>{
if(!undo)return;
const timer=setTimeout(()=>setUndo(null),5000);
return()=>clearTimeout(timer);
},[undo]);
const restoreUndo=()=>{
if(!undo)return;
setTasks(ts=>ts.map(t=>t.id===undo.id?undo:t));
setUndo(null);
};
const tabs=[
{id:"agenda",label:"Agenda",icon:"A"},
{id:"inbox",label:"Inbox",icon:"I"},
{id:"orders",label:"Orders",icon:"O"},
{id:"builds",label:"Builds",icon:"B"}
];
return(
<div className="app">
<div className="header">
<div className="brand">Life Dashboard</div>
<div className="headerBtns">
<button className="iconBtn" onClick={()=>setTaskModal(true)}>Add</button>
<button className="iconBtn" onClick={()=>setSettings(true)}>Set</button>
</div>
</div>
{tab==="agenda"&&<Agenda tasks={data.tasks} setTasks={setTasks} setUndo={setUndo} openTask={()=>setTaskModal(true)}/>}
{tab==="inbox"&&<Inbox inbox={data.inbox} setInbox={setInbox} setTasks={setTasks} setOrders={setOrders}/>}
{tab==="orders"&&<Orders orders={data.orders} setOrders={setOrders}/>}
{tab==="builds"&&<Builds builds={data.builds} setBuilds={setBuilds}/>}
<div className="bottomNav">
{tabs.map(t=>(
<button key={t.id} className={"navBtn "+(tab===t.id?"active":"")} onClick={()=>setTab(t.id)}>
<span className="navIcon">{t.icon}</span>
{t.label}
</button>
))}
</div>
{undo&&(
<div className="undo">
<div>Task completed</div>
<button className="btn small" onClick={restoreUndo}>Undo</button>
</div>
)}
{taskModal&&(
<TaskModal
onClose={()=>setTaskModal(false)}
onSave={(task)=>{
setTasks(ts=>[task,...ts]);
setTaskModal(false);
}}
/>
)}
{settings&&<Settings data={data} setData={setData} onClose={()=>setSettings(false)}/>}
</div>
);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
const manifest={
name:"Life Dashboard",
short_name:"LifeDash",
start_url:".",
display:"standalone",
background_color:"#0f0f11",
theme_color:"#0f0f11",
orientation:"portrait"
};
const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
const url=URL.createObjectURL(blob);
const link=document.createElement("link");
link.rel="manifest";
link.href=url;
document.head.appendChild(link);
</script>
</body>
</html>
